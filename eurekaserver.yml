server:
  port: 8070

eureka:
  instance:
    hostname: localhost # telling to the Eureka server to use localhost as the hostname (localhost ở đây là máy chủ mình)
  client:
    fetchRegistry: false
    registerWithEureka: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
